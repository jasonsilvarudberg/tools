<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Compare Tool</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #cbd5e1;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --text-color: #1e293b;
            /* red text */
            --change-color: #cf222e; 
            --del-bg: #ffebe9;
            --ins-bg: #fde8e8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        h1 {
            margin-top: 0;
            font-size: 1.8rem;
            text-align: center;
            color: #0f172a;
        }

        .text-areas {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .text-areas {
                grid-template-columns: 1fr;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        textarea {
            height: 200px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }

        button {
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: #e2e8f0;
            color: #334155;
        }

        .btn-secondary:hover {
            background-color: #cbd5e1;
        }

        .output-container {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            background-color: #fafafa;
            min-height: 100px;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.6;
            font-size: 1rem;
        }

        /* All changes styled in red like MS Word Tracking */
        del {
            color: var(--change-color);
            background-color: var(--del-bg);
            text-decoration: line-through;
            padding: 2px 2px;
        }

        ins {
            color: var(--change-color);
            background-color: var(--ins-bg);
            text-decoration: none;
            border-bottom: 1px solid var(--change-color);
            padding: 2px 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Text Comparison Tool</h1>
    
    <div class="text-areas">
        <div class="input-group">
            <label id="label-original" for="original-text">Original Text</label>
            <textarea id="original-text" placeholder="Paste your original reference text here..."></textarea>
        </div>
        <div class="input-group">
            <label id="label-revised" for="revised-text">Revised Text</label>
            <textarea id="revised-text" placeholder="Paste your revised text here..."></textarea>
        </div>
    </div>

    <div class="controls">
        <button class="btn-primary" onclick="compareText()">Compare Text</button>
        <button class="btn-secondary" onclick="swapText()">Swap Reference</button>
    </div>

    <h3>Comparison Result</h3>
    <div id="output" class="output-container">Comparison results will appear here...</div>
</div>

<script>
    function diffWords(original, revised) {
        const tokenize = (text) => text.match(/([a-zA-Z0-9_]+|[^a-zA-Z0-9_\s]+|\s+)/g) || [];
        
        const a = tokenize(original);
        const b = tokenize(revised);
        
        const N = a.length;
        const M = b.length;
        
        const MAX = N + M;
        const V = { 1: 0 };
        const trace = [];

        for (let d = 0; d <= MAX; d++) {
            const vCopy = { ...V };
            trace.push(vCopy);
            for (let k = -d; k <= d; k += 2) {
                let x;
                if (k === -d || (k !== d && V[k - 1] < V[k + 1])) {
                    x = V[k + 1];
                } else {
                    x = V[k - 1] + 1;
                }
                let y = x - k;
                while (x < N && y < M && a[x] === b[y]) {
                    x++;
                    y++;
                }
                V[k] = x;
                if (x >= N && y >= M) {
                    return backtrack(trace, a, b);
                }
            }
        }
    }

    function backtrack(trace, a, b) {
        let x = a.length;
        let y = b.length;
        const edits = [];

        for (let d = trace.length - 1; d >= 0; d--) {
            const V = trace[d];
            const k = x - y;
            let prevK;
            
            if (k === -d || (k !== d && V[k - 1] < V[k + 1])) {
                prevK = k + 1;
            } else {
                prevK = k - 1;
            }

            const prevX = V[prevK];
            const prevY = prevX - prevK;

            while (x > prevX && y > prevY) {
                edits.push({ type: 'equal', value: a[x - 1] });
                x--;
                y--;
            }

            if (d > 0) {
                if (x === prevX) {
                    edits.push({ type: 'insert', value: b[y - 1] });
                    y--;
                } else {
                    edits.push({ type: 'delete', value: a[x - 1] });
                    x--;
                }
            }
        }
        return edits.reverse();
    }

    function compareText() {
        const original = document.getElementById('original-text').value;
        const revised = document.getElementById('revised-text').value;
        const output = document.getElementById('output');

        if (!original && !revised) {
            output.innerHTML = "Please enter some text to compare.";
            return;
        }

        const diffs = diffWords(original, revised);
        
        let htmlResult = '';
        diffs.forEach(part => {
            const escapedValue = escapeHtml(part.value);
            if (part.type === 'insert') {
                htmlResult += `<ins>${escapedValue}</ins>`;
            } else if (part.type === 'delete') {
                htmlResult += `<del>${escapedValue}</del>`;
            } else {
                htmlResult += escapedValue;
            }
        });

        output.innerHTML = htmlResult || "No changes detected.";
    }

    function swapText() {
        const originalInput = document.getElementById('original-text');
        const revisedInput = document.getElementById('revised-text');
        
        const temp = originalInput.value;
        originalInput.value = revisedInput.value;
        revisedInput.value = temp;
        
        compareText();
    }

    function escapeHtml(string) {
        return string
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }
</script>

</body>
</html>
